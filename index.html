<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Branching Narrative Engine</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; background: #1a1a2e; color: #ddd; }
        .scene { background: #16213e; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .choices button { 
            display: block; width: 100%; margin: 10px 0; padding: 15px; 
            background: #0f3460; color: white; border: none; border-radius: 6px; 
            font-size: 1.1em; cursor: pointer; 
        }
        .choices button:hover { background: #e94560; }
        .log { margin-top: 20px; font-size: 0.9em; opacity: 0.8; }
        .status { font-size: 0.9em; color: #aaa; }
    </style>
</head>
<body>
    <h1>🌌 AI Branching Narrative</h1>
    <div id="status" class="status">Loading story...</div>
    <div id="scene" class="scene"></div>
    <div id="choices" class="choices"></div>
    <div id="log" class="log"></div>

    <script>
        let currentScene = "start";
        let state = { current_scene: "start" };
        let story = {
            "start": {
                "description": "You stand at the threshold of an unknown path. A mysterious device in your hand pulses with possibilities. The air hums with potential.",
                "choices": [
                    {"text": "Activate the device and step forward", "next_scene": "device_path", "effects": {"curiosity": 1}},
                    {"text": "Observe carefully first", "next_scene": "observe_path", "effects": {"caution": 1}},
                    {"text": "Turn back and seek familiar ground", "next_scene": "end_safe", "effects": {"safety": 1}}
                ]
            },
            "device_path": {
                "description": "The device awakens, revealing branching realities. Visions of alternate paths flood your mind.",
                "choices": [
                    {"text": "Dive deeper into the visions", "next_scene": "deep_dive", "effects": {"knowledge": 2}},
                    {"text": "Use it to contact an ally", "next_scene": "ally_contact", "effects": {"connection": 1}}
                ]
            },
            "observe_path": {
                "description": "Careful observation reveals hidden patterns in the landscape. A safer but slower route emerges.",
                "choices": [
                    {"text": "Follow the patterns", "next_scene": "patterns_follow", "effects": {"wisdom": 1}}
                ]
            },
            "end_safe": {
                "description": "You return to safety, but wonder what you might have discovered. The adventure ends... for now.",
                "choices": []
            }
            // Add more scenes here or make dynamic
        };

        function render() {
            const sceneData = story[currentScene] || {description: "The story has ended.", choices: []};
            document.getElementById("scene").innerHTML = `<p>${sceneData.description}</p>`;
            
            const choicesDiv = document.getElementById("choices");
            choicesDiv.innerHTML = "";
            sceneData.choices.forEach((choice, index) => {
                const btn = document.createElement("button");
                btn.textContent = choice.text;
                btn.onclick = () => makeChoice(choice);
                choicesDiv.appendChild(btn);
            });
            
            document.getElementById("status").textContent = `Scene: ${currentScene} | State: ${JSON.stringify(state)}`;
        }

        function makeChoice(choice) {
            // Apply effects
            for (let key in choice.effects) {
                state[key] = (state[key] || 0) + choice.effects[key];
            }
            currentScene = choice.next_scene;
            state.current_scene = currentScene;
            
            // Log
            const log = document.getElementById("log");
            log.innerHTML += `<p>You chose: ${choice.text}</p>`;
            log.scrollTop = log.scrollHeight;
            
            if (story[currentScene] && story[currentScene].choices.length === 0) {
                document.getElementById("choices").innerHTML = "<p><strong>The story concludes.</strong></p>";
            } else {
                render();
            }
        }

        // Start
        render();
    </script>
</body>
</html>
